blueprint:
  name: Zone Manager — Холл. Включение по датчикам (ON)
  description: >
    Холл: включение по датчикам движения. По trigger.entity_id берём конфиг через
    zone_manager.get_sensor_config и запускаем выбранный скрипт (обычно motion_on).
    Есть защита: до 12 датчиков, без дублей, скрипт строго один.
  domain: automation
  input:
    automation_label:
      name: Имя автоматизации (для логов)
      description: >
        Используется только в сообщениях в system_log. Реальное имя автоматизации
        задаётся в HA при создании автоматизации из blueprint.
      default: "Hall ON"
      selector:
        text: {}

    motion_sensors:
      name: Датчики
      description: >
        Список датчиков (до 12). Используются в triggers. Дубли запрещены.
      selector:
        entity:
          domain: sensor
          multiple: true

    on_script:
      name: Скрипт
      description: >
        Скрипт-обработчик включения (строго 1). Получит:
        trigger_sensor, light_group, neighbor_light_groups.
      selector:
        entity:
          domain: script

    ba_gate_entity:
      name: Сущность-разрешение (Building Automation)
      description: >-
        binary_sensor Оркестратора здания, разрешающий работу по датчикам на
        этом этаже. Автоматизация выполняется, пока сущность НЕ в состоянии
        "off". Отсутствующая, unavailable и unknown — разрешают работу.
      selector:
        entity:
          filter:
            domain: binary_sensor

mode: single

trigger:
  - platform: state
    entity_id: !input motion_sensors
    to: "motion"

variables:
  ba_gate_entity: !input ba_gate_entity

# Гейт Оркестратора здания. Пропускаем работу, пока сущность НЕ в "off".
# Отсутствие / unavailable / unknown — РАЗРЕШАЮТ: без Оркестратора и при его
# перезагрузке свет по датчикам работает как сейчас.
#
# ⚠ Именно шаблон, а не condition:state. На отсутствующей сущности state бросает
# ошибку, not её не глотает, и автоматизация падает в fail-closed — гасит свет
# по всему объекту. has_value() тоже нельзя: он даёт False на unavailable/unknown.
# Нужен голый states(...) != 'off'. Разбор — docs/internal/contract-answer-01-gate.md.
condition:
  - condition: template
    value_template: "{{ states(ba_gate_entity) != 'off' }}"

action:
  # ----------------------------
  # Валидация входных данных blueprint
  # ----------------------------
  - variables:
      automation_label: !input automation_label
      sensors: !input motion_sensors
      sensors_unique: "{{ sensors | unique | list }}"
      sensors_count: "{{ sensors | length }}"
      duplicates_ok: "{{ (sensors_unique | length) == sensors_count }}"
      limit_ok: "{{ sensors_count > 0 and sensors_count <= 12 }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not (duplicates_ok and limit_ok) }}"
        sequence:
          - service: system_log.write
            data:
              level: warning
              message: >-
                zone_manager blueprint input invalid ({{ automation_label }}):
                sensors_count={{ sensors_count }},
                duplicates_ok={{ duplicates_ok }},
                limit_ok={{ limit_ok }},
                sensors={{ sensors }}
          - stop: "Blueprint input invalid: duplicates or sensors limit exceeded"
    default: []

  # ----------------------------
  # Основная логика включения (как в автоматизации)
  # ----------------------------
  - variables:
      trigger_sensor: "{{ trigger.entity_id }}"

  - action: zone_manager.get_sensor_config
    data:
      entity_id: "{{ trigger_sensor }}"
      reload: false
    response_variable: zm

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ zm.found }}"
        sequence:
          # Вызываем выбранный скрипт (строго один)
          - service: script.turn_on
            target:
              entity_id: !input on_script
            data:
              variables:
                trigger_sensor: "{{ trigger_sensor }}"
                light_group: "{{ zm.light_group }}"
                neighbor_light_groups: "{{ zm.neighbor_groups }}"
    default:
      - service: system_log.write
        data:
          level: warning
          message: >-
            zone_manager: config not found for {{ trigger_sensor }} ({{ automation_label }})
