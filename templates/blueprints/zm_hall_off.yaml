blueprint:
  name: Zone Manager — Холл. Выключение по датчикам (OFF)
  description: >
    Холл: выключение по датчикам (template trigger).
    Срабатывает, когда ВСЕ выбранные датчики находятся в состоянии 'vacant'
    непрерывно N секунд (N берётся из input_number).
    Конфиг зоны берётся через zone_manager.get_sensor_config по anchor_sensor (первый датчик из списка),
    затем вызываются 2 скрипта: выключение своей зоны и выключение соседних зон.
    Есть защита от дублей и лимит до 12 датчиков.
  domain: automation
  input:
    automation_label:
      name: Имя автоматизации (для логов)
      description: >
        Используется только в сообщениях в system_log. Реальное имя автоматизации
        задаётся в HA при создании автоматизации из blueprint.
      default: "Hall OFF"
      selector:
        text: {}

    vacancy_sensors:
      name: Датчики
      description: >
        Список датчиков (до 12). Логика: все должны быть 'vacant' в течение заданного времени.
        Дубли запрещены.
      selector:
        entity:
          domain: sensor
          multiple: true

    vacant_delay_input:
      name: Время перехода в vacant
      description: >
        input_number, из которого берётся задержка (секунды) для for:seconds.
      selector:
        entity:
          domain: input_number

    off_script_1:
      name: Скрипт 1 (выключение своей зоны)
      description: >
        Получит:
        trigger_sensor (anchor), neighbors, light_group (light_group_single).
      selector:
        entity:
          domain: script

    off_script_2:
      name: Скрипт 2 (выключение соседних зон)
      description: >
        Получит:
        trigger_sensor (anchor), neighbors, far_neighbors, neighbor_light_groups.
      selector:
        entity:
          domain: script

mode: single

# ВАЖНО: чтобы переменные были доступны в trigger.for и value_template
trigger_variables:
  sensors_raw: !input vacancy_sensors
  sensors_unique: "{{ sensors_raw | unique | list }}"
  anchor_sensor: "{{ sensors_unique[0] if (sensors_unique | length > 0) else '' }}"
  vacant_delay_entity: !input vacant_delay_input

trigger:
  - platform: template
    value_template: >-
      {% set s = sensors_unique %}
      {{ s | length > 0 and (s | select('is_state', 'vacant') | list | length == (s | length)) }}
    for:
      seconds: "{{ states(vacant_delay_entity) | float(0) }}"

condition: []

action:
  # ----------------------------
  # Валидация входных данных blueprint
  # ----------------------------
  - variables:
      automation_label: !input automation_label
      sensors_count: "{{ sensors_raw | length }}"
      unique_count: "{{ sensors_unique | length }}"
      duplicates_ok: "{{ sensors_count == unique_count }}"
      limit_ok: "{{ sensors_count > 0 and sensors_count <= 12 }}"
      anchor_ok: "{{ anchor_sensor != '' }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not (duplicates_ok and limit_ok and anchor_ok) }}"
        sequence:
          - service: system_log.write
            data:
              level: warning
              message: >-
                zone_manager hall_off blueprint input invalid ({{ automation_label }}):
                sensors_count={{ sensors_count }},
                unique_count={{ unique_count }},
                duplicates_ok={{ duplicates_ok }},
                limit_ok={{ limit_ok }},
                anchor_sensor={{ anchor_sensor }},
                sensors={{ sensors_raw }}
          - stop: "Blueprint input invalid"
    default: []

  # ----------------------------
  # Основная логика OFF: anchor -> zone_manager -> 2 скрипта
  # ----------------------------
  - action: zone_manager.get_sensor_config
    data:
      entity_id: "{{ anchor_sensor }}"
      reload: false
    response_variable: zm

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ zm.found }}"
        sequence:
          - service: script.turn_on
            target:
              entity_id: !input off_script_1
            data:
              variables:
                trigger_sensor: "{{ anchor_sensor }}"
                neighbors: "{{ zm.neighbors }}"
                light_group: "{{ zm.light_group_single }}"

          - service: script.turn_on
            target:
              entity_id: !input off_script_2
            data:
              variables:
                trigger_sensor: "{{ anchor_sensor }}"
                neighbors: "{{ zm.neighbors }}"
                far_neighbors: "{{ zm.far_neighbors }}"
                neighbor_light_groups: "{{ zm.neighbor_groups }}"
    default:
      - service: system_log.write
        data:
          level: warning
          message: >-
            zone_manager: config not found for {{ anchor_sensor }} ({{ automation_label }})
