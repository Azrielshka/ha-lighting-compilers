# Главная страница дашборда. Правьте вид здесь — генератор трогает маркеры.
#
# Маркеры (подставляет генератор):
#   [[PATH]]          — путь view. НЕ ТРОГАТЬ: по префиксу `zm-` деплой отличает
#                       свои views от ваших. Сменить путь = деплой перестанет
#                       узнавать Главную и наплодит дубли.
#   [[TITLE]]         — заголовок объекта (флаг --title)
#   [[FLOOR_BLOCKS]]  — блок на каждый этаж (_blocks/main_floor_block.yaml)
#
# Главная обязана быть ПЕРВЫМ view дашборда: на первый view открывается
# дашборд, и на него же ведёт кнопка «назад» с этажных view. Порядок держит
# ha_views.INSERT_AT = 0 — не меняйте его, не поменяв кнопку «назад».
#
# Чего здесь намеренно НЕТ (решение владельца 2026-07-16):
#   • кастомный фон — убран;
#   • карточка «Выбор режима работы колледжа» — убрана;
#   • виджеты шапки (режим, календари) — убраны.
# Нужно вернуть — дописывайте сюда: генератор трогает только маркеры.
title: Главная
path: [[PATH]]
icon: mdi:home
type: sections
max_columns: 3
header:
  layout: responsive
  badges_position: top
  badges_wrap: wrap
  card:
    type: markdown
    text_only: true
    content: "# [[TITLE]]"
sections:
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading_style: title
        heading: Управление этажами
      [[FLOOR_BLOCKS]]
