# Блок одной сервисной страницы на Главной: заголовок и кнопка перехода.
# Повторяется по числу страниц из canon.SERVICE_VIEWS (сейчас их две:
# расписание и конфигурация).
#
# Маркеры (подставляет генератор):
#   [[SERVICE_HEADING]]  — заголовок с эмодзи
#   [[SERVICE_ICON]]     — иконка кнопки
#   [[SERVICE_BUTTON]]   — подпись кнопки
#   [[SERVICE_PATH]]     — путь страницы (canon.SERVICE_VIEWS)
#   [[DASHBOARD]]        — url_path дашборда
#
# ⚠ Страницы, на которые ведут кнопки, деплой ВЫСЕВАЕТ пустыми и больше не
# трогает — они принадлежат владельцу (см. canon.SERVICE_VIEWS). Поменяете
# здесь путь мимо канона — кнопка уведёт в «view not found», потому что высеет
# деплой совсем другую страницу. Путь берите только из канона.
#
# ⚠ Почему кнопка, а не `type: picture` с картинкой из /media (так было в
# образце с объекта): картинка — бинарник, которого нет ни в репозитории, ни на
# чистом объекте, и карточка показала бы битое изображение. Иконка ничего не
# требует.
#
# grid_options здесь на КОРНЕ блока — и только здесь. Внутри vertical-stack они
# инертны: их получают лишь прямые дети секции. В образце с объекта такие
# внутренние grid_options были, но ни на что не влияли.
- type: vertical-stack
  cards:
    - type: heading
      heading_style: title
      heading: "[[SERVICE_HEADING]]"
    - type: button
      icon: "[[SERVICE_ICON]]"
      name: "[[SERVICE_BUTTON]]"
      show_state: false
      tap_action:
        action: navigate
        navigation_path: /[[DASHBOARD]]/[[SERVICE_PATH]]
  grid_options:
    columns: 6
    rows: auto
