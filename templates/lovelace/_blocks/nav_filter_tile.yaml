# Одна плитка фильтра навигации. Повторяется по canon.NAV_TYPE_LABELS плюс «Все».
#
# Маркеры (подставляет генератор):
#   [[FILTER_ENTITY]]  — input_boolean.nav_type_<тип> либо nav_type_all
#   [[FILTER_LABEL]]   — подпись из канона («Коридоры», «Все помещения»)
#   [[FILTER_ICON]]    — иконка из канона
#
# ⚠ tap_action: toggle, а НЕ features: [toggle]. Плитка с фичей-переключателем
# в полтора раза выше: семь таких занимают пол-экрана и оттесняют помещения,
# ради которых страницу открыли. Здесь вся плитка — кнопка, а состояние видно
# цветом: включённый фильтр подсвечен, выключенный серый.
#
# ⚠ Подпись и иконку берём из канона, а не пишем в шаблоне. Их же читает
# generate_helpers, создавая сами помощники: разъедутся — в панели будет одно
# имя, в реестре HA другое.
- type: tile
  entity: "[[FILTER_ENTITY]]"
  name: "[[FILTER_LABEL]]"
  icon: "[[FILTER_ICON]]"
  vertical: true
  hide_state: true
  tap_action:
    action: toggle
