# Плитка света технических помещений этажа — вторая половина ряда на Главной.
#
# Маркеры (подставляет генератор):
#   [[FLOOR]]       — номер этажа
#   [[TECH_LIGHT]]  — light.tekh_pom_<N>_i_этаж
#
# ⚠ Отдельным блоком, а не строками в main_floor_block, потому что этой группы
# на этаже может не быть: generate_floor_groups заводит её только там, где есть
# помещения типов korridor / special / recreation. На этаже без них плитка
# висела бы в пустоте — «сущность недоступна». Генератор ставит блок только на
# те этажи, где группа реально создаётся, иначе ряд остаётся из одной плитки.
- type: tile
  entity: "[[TECH_LIGHT]]"
  name: Тех.пом. [[FLOOR]]-й этаж
  vertical: false
  features_position: bottom
  features:
    - type: toggle
