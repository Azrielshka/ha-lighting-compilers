# Панель фильтра навигации: «Все помещения» + шесть типов.
#
# Одна и та же панель стоит на Главной и в шапке каждого этажного view —
# чтобы фильтровать, не возвращаясь назад.
#
# Маркер (подставляет генератор):
#   [[FILTER_TILES]]  — плитки из _blocks/nav_filter_tile.yaml
#
# ⚠ Помощники ОБЩИЕ на объект, а не на этаж (canon: nav_type_*). Поэтому
# панель на всех страницах управляет одним и тем же: отфильтровали на Главной —
# этажные страницы уже отфильтрованы. Так и задумано: обход «только коридоры»
# не должен сбрасываться при переходе между этажами.
#
# ⚠ Следствие, о котором стоит помнить: состояние фильтра ОБЩЕЕ и для людей.
# Отфильтровал наладчик на планшете — оператор видит то же самое. Иначе было бы
# только со своей JS-картой, где состояние живёт в браузере; её отложили
# осознанно (см. decisions.md).
#
# «Все помещения» идёт первым и работает как выключатель фильтра: пока он
# включён, видно всё, что бы ни было отмечено ещё. Гасить остальные он не
# умеет — за помощниками мы логики не пишем, всё держится на условиях
# видимости карточек.
- type: grid
  columns: 4
  square: false
  cards:
    - type: heading
      heading: Показывать
      heading_style: subtitle
      icon: mdi:filter-variant
      grid_options:
        columns: full
    [[FILTER_TILES]]
    # ⚠ ВРЕМЕННОЕ: второй фильтр — тот же набор типов одним списком.
    # Стоит рядом с плитками намеренно: их и сравниваем. Условия видимости
    # складываются по И, поэтому каждый фильтр глушится своим «Все»:
    # булевы на «Все» -> рулит список; список на «Все» -> рулят плитки.
    - type: tile
      entity: "[[FILTER_SELECT]]"
      icon: mdi:filter-menu
      features_position: bottom
      features:
        - type: select-options
      grid_options:
        columns: full
