# special — санузлы/тамбуры. Простой вертикальный список пар «свет | датчик(и)».
# Без разбивки по 3 и без заголовков «Группы/Датчики» — помещения мелкие (1–3 зоны).
#
# Маркеры:
#   [[HEADING]], [[GENERAL_LIGHT]], [[ZONES]]
#
# Разворот [[ZONES]]: на каждую зону — одна строка type: grid, columns: 12,
#   square: false: свет широкий (columns: 9), датчик(-и) узкие справа (columns: 3
#   суммарно, делятся между собой). Строки идут вертикально, одна под другой.
#   Блоки: _blocks/light_tile.yaml, _blocks/sensor_tile.yaml.
type: grid
columns: 1
square: false
grid_options:
  columns: 12
  rows: auto
cards:
  - type: heading
    heading: "[[HEADING]]"
    heading_style: title
  - type: tile
    entity: [[GENERAL_LIGHT]]
    features:
      - type: toggle
      - type: light-brightness
    features_position: bottom
  [[ZONES]]
