# recreation — рекреации. Общий свет + узкие группы (mushroom-light-card) +
# датчики движения в 2 колонки. Селектора режима НЕТ (убран). Сущностей
# освещённости НЕТ. Требует HACS-карту mushroom (считаем установленной).
#
# Маркеры:
#   [[HEADING]], [[GENERAL_LIGHT]]
#   [[ZONE_GROUPS]]  — на каждую зону mushroom-light-card (_blocks/recreation_group.yaml)
#   [[SENSORS_2COL]] — датчики движения плитками, лягут в грид columns: 2 ниже
#
# ⚠ grid_options.columns: full — НЕ 12. Сетка секции считается как
#   base(12) * column_span, поэтому при column_span: 2 в ней 24 колонки,
#   и columns: 12 дал бы ровно ПОЛОВИНУ ширины. `full` = grid-column: 1/-1,
#   то есть вся ширина при любом column_span. Проверено на объекте.
type: grid
columns: 1
square: false
grid_options:
  columns: full
  rows: auto
cards:
  - type: heading
    heading: "[[HEADING]]"
    heading_style: title
  - type: tile
    entity: [[GENERAL_LIGHT]]
    name: "[[HEADING]]"
    features:
      - type: toggle
      - type: light-brightness
    features_position: bottom
    grid_options:
      columns: 12
      rows: 3
  [[ZONE_GROUPS]]
  - type: grid
    columns: 2
    square: false
    cards:
      [[SENSORS_2COL]]
