# Этажный view: шапка, бейджи, компактные карточки помещений этажа.
# Правьте вид здесь — генератор трогает только маркеры.
#
# Маркеры (подставляет генератор):
#   [[PATH]]         — путь view. НЕ ТРОГАТЬ: по префиксу `zm-` деплой отличает
#                      свои views от ваших. Сменить путь = деплой перестанет
#                      узнавать этот view и вместо замены наплодит дубли.
#   [[FLOOR]]        — номер этажа (1, 2, …)
#   [[FLOOR_ICON]]   — иконка этажа, та же, что у этажа в реестре HA
#   [[FLOOR_LIGHT]]  — light.ves_<N>_i_etazh, группа «Весь N-й этаж» (мы её и создаём)
#   [[DASHBOARD]]    — url_path дашборда, из флага --dashboard
#   [[CARDS]]        — компактные карточки помещений этажа
#
# ⚠ Про [[FLOOR_LIGHT]]: entity_id выводится из ИМЕНИ группы через slugify, а не
# из её unique_id. Группа с name «Весь 1-й этаж» и unique_id floor_1_all живёт
# как light.ves_1_i_etazh; light.floor_1_all не существует вовсе. На этом уже
# обожглись — бейдж висел в пустоте и показывал «сущность недоступна».
#
# Бейджи ссылаются на помощников, которых создаёт шаг 7 пайплайна
# (generate_helpers.py): input_button.but_back — один на объект,
# input_boolean.regim_auto_<этаж> — по одному на этаж. Раньше их заводил
# владелец руками; с 2026-07-17 это делает пайплайн.
#
# Навигация «назад» ведёт на /[[DASHBOARD]] без указания view: так открывается
# ПЕРВЫЙ view дашборда. Первой стоит наша Главная (zm-main, ha_views.INSERT_AT = 0)
# — поэтому знать её path не нужно. Нужен другой — допишите его здесь руками.
title: Этаж [[FLOOR]]
path: [[PATH]]
icon: [[FLOOR_ICON]]
type: sections
max_columns: 3
header:
  layout: responsive
  badges_position: top
  badges_wrap: wrap
  card:
    type: markdown
    text_only: true
    content: "# [[FLOOR]] Этаж"
badges:
  - type: entity
    entity: input_button.but_back
    show_name: true
    show_state: false
    show_icon: true
    color: red
    tap_action:
      action: navigate
      navigation_path: /[[DASHBOARD]]
  - type: entity
    entity: [[FLOOR_LIGHT]]
    show_name: true
    show_state: true
    show_icon: true
    name: Управление светом [[FLOOR]]-го этажа
  - type: entity
    entity: input_boolean.regim_auto_[[FLOOR]]
    show_name: true
    show_state: true
    show_icon: true
    color: green
sections:
  # Панель фильтра — СВЕРХУ (решение владельца 2026-07-20): фильтровать, не
  # листая до низа. Помощники общие на объект, поэтому панель здесь и на
  # Главной управляет одним и тем же.
  - type: grid
    column_span: 3
    cards:
      [[NAV_FILTER]]
  - type: grid
    column_span: 3
    cards:
      [[CARDS]]
