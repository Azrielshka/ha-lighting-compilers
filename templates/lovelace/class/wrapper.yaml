# class — кабинеты. Общий свет + грид на N колонок (N = число зон, 2–4),
# три ряда, колонки выровнены по зонам:
#   ряд 1 — группы света;
#   ряд 2 — датчики (по одному на группу);
#   ряд 3 — подпись расположения (ЗАГЛУШКА '—', владелец правит: у двери / у окна…).
#
# Маркеры:
#   [[HEADING]], [[GENERAL_LIGHT]]
#   [[ZONE_COUNT]]   — число зон, идёт в columns внутреннего грида
#   [[ZONE_COLUMNS]] — генератор кладёт в грид порядок
#     [свет_1..N, датчик_1..N, подпись_1..N] → грид сам разложит в 3 ряда.
#   Блоки: _blocks/light_tile.yaml, _blocks/sensor_tile.yaml, _blocks/class_label.yaml.
type: grid
columns: 1
square: false
grid_options:
  columns: 12
  rows: auto
cards:
  - type: heading
    heading: "[[HEADING]]"
    heading_style: title
  - type: tile
    entity: [[GENERAL_LIGHT]]
    features:
      - type: toggle
      - type: light-brightness
    features_position: bottom
  - type: grid
    columns: [[ZONE_COUNT]]
    square: false
    cards:
      [[ZONE_COLUMNS]]
