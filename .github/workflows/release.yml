name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'   # запуск при создании тега (v1.0, v1.1 и т.д.)


jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Сборка exe
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole launcher/main.py --name launcher
      # 5. Prepare release folder
      - name: Prepare release folder
        run: |
          mkdir release

          # exe
          copy dist\launcher.exe release\launcher.exe

          # templates
          xcopy templates release\templates /E /I

          # data + пример excel
          mkdir release\data
          copy data\*.xlsx release\data\

          # requirements
          copy requirements.txt release\requirements.txt

          # инструкция
          copy README_RELEASE.txt release\INSTALL.txt
          
          # scripts
          xcopy scripts release\scripts /E /I

      # 6. Архивация
      - name: Create ZIP archive
        run: |
          powershell Compress-Archive -Path release\* -DestinationPath ha-college-lighting.zip

      # 7. Создание релиза
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ha-college-lighting.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}