# Вспомогательные объекты (helpers) для Home Assistant.
#
# Сгенерировано generate_helpers.py — правки здесь перезатрёт деплой.
# Значения задаются в scripts/_lib/canon.py.
#
# Пайплайн создаёт сами объекты, но НЕ логику за ними: пресеты зала и
# режимы этажей — это выключатели, их поведение описывают ваши
# автоматизации. Исключение — vacant_delay и nav_floor_<N>: их читает
# сгенерированный код (OFF-автоматизации и кнопка перехода на Главной).
#
# ⚠ initial у vacant_delay применяется при КАЖДОМ старте HA, а не
# только при создании. Это осознанно: значение принадлежит пайплайну.
lighting_compilers:
  input_number:
    vacant_delay:
      name: Задержка перехода в vacant
      min: 0
      max: 300
      step: 1
      initial: 10
      unit_of_measurement: с
      mode: box
      icon: mdi:timer-outline
  input_button:
    but_back:
      name: Назад
      icon: mdi:skip-backward
  input_boolean:
    regim_auto_1:
      name: Автоматический режим — 1 этаж
      icon: mdi:motion-sensor
    regim_auto_2:
      name: Автоматический режим — 2 этаж
      icon: mdi:motion-sensor
    rezhim_tetra:
      name: Режим театра
      icon: mdi:theater
    polnaia_iarkost:
      name: Максимальная яркость
      icon: mdi:theater
    priglushennoe_osveshchenie:
      name: Приглушенный свет
      icon: mdi:theater
    rezhim_meropriiatiia:
      name: Режим мероприятия
      icon: mdi:theater
  input_select:
    nav_floor_1:
      name: Помещения 1 этажа
      options:
      - —
      - 101 Тамбур
      - 102 Тамбур
      - 103 Вестибюль
      - 104 Методический кабинет
      - 105 Актовый зал
      - 106 Лестница
      - 107 Рекреация
      initial: —
      icon: mdi:door
    nav_floor_2:
      name: Помещения 2 этажа
      options:
      - —
      - 208 Входной тамбур
      initial: —
      icon: mdi:door
